<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; font-family: system-ui, sans-serif; padding: 12px; }
    h3 { margin: 0 0 8px 0; font-size: 14px; }
    button { width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; }
    #status { font-size: 12px; color: #555; margin-top: 8px; }
    .ok { color: green; }
    .err { color: red; }
  </style>
</head>
<body>
  <h3>Xiangqi Bot Helper</h3>
  <button id="ping">Test content script</button>
  <button id="testEngine">Test Pikafish server</button>
  <button id="readBoard">Đọc thế cờ → FEN</button>
  <button id="suggest">Gợi ý nước đi</button>
  <label style="font-size:12px; display:block; margin-top:6px;">
    Lượt:
    <select id="side">
      <option value="w">Đỏ (w)</option>
      <option value="b">Đen (b)</option>
    </select>
    Time:
    <select id="movetime">
      <option value="500">0.5s</option>
      <option value="1000" selected>1s</option>
      <option value="2000">2s</option>
      <option value="5000">5s</option>
    </select>
  </label>
  <div id="status">Sẵn sàng.</div>
  <script src="popup.js"></script>
</body>
</html>
