<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --paper: #f4dfb8;
      --red: #a62018;
      --red-dark: #67150f;
      --ink: #24120b;
      --muted: #73513a;
      --line: rgba(74, 36, 23, 0.22);
      --green: #2f7d46;
      --amber: #b7791f;
      --wood-dark: #4a2417;
    }

    * { box-sizing: border-box; }

    body {
      width: 320px;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(74,36,23,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(74,36,23,0.08) 1px, transparent 1px),
        var(--paper);
      background-size: 38px 38px;
      font: 13px/1.45 "Segoe UI", system-ui, sans-serif;
    }

    .shell { padding: 14px; }

    .top {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .piece {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 3px solid var(--red-dark);
      border-radius: 50%;
      background: var(--red);
      color: #ffe8bd;
      font: 800 22px/1 "Microsoft YaHei", "SimSun", serif;
      box-shadow: inset 0 0 0 2px rgba(255,232,189,0.26), 0 2px 0 rgba(74,36,23,0.22);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 82px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .pill.on { color: var(--green); }

    .status {
      min-height: 40px;
      padding: 9px 10px;
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.34);
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .status.ok { color: var(--green); border-color: rgba(47,125,70,0.35); }
    .status.err { color: var(--red); border-color: rgba(166,32,24,0.35); }

    button, select { font: inherit; }

    button {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.34);
      color: var(--ink);
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(166,32,24,0.42);
      background: rgba(255,255,255,0.5);
    }

    button:active { transform: translateY(1px); }

    .primary {
      min-height: 43px;
      border: 0;
      background: var(--red);
      color: #fff1cf;
      font-weight: 800;
      box-shadow: 0 2px 0 var(--red-dark);
    }

    .primary:hover { background: #ba2a20; }
    .primary.stop { background: var(--wood-dark); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin-bottom: 8px;
      color: var(--wood-dark);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    label {
      display: grid;
      gap: 5px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    select {
      width: 100%;
      height: 34px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.46);
      color: var(--ink);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--red);
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 10px;
    }

    .toggle.active {
      border-color: rgba(47,125,70,0.42);
      color: var(--green);
      background: rgba(47,125,70,0.12);
      font-weight: 750;
    }

    .switch-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.34);
      cursor: pointer;
    }

    .switch-title {
      font-weight: 800;
      color: var(--ink);
    }

    .switch-sub {
      color: var(--muted);
      font-size: 11px;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 28px;
      border: 1px solid rgba(183,121,31,0.38);
      border-radius: 999px;
      background: rgba(183,121,31,0.18);
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 1px 2px rgba(36,18,11,0.24);
      transition: transform 0.16s ease, background 0.16s ease;
    }

    .switch.active {
      border-color: rgba(47,125,70,0.42);
      background: rgba(47,125,70,0.14);
    }

    .switch.active::after {
      transform: translateX(24px);
      background: var(--green);
    }

    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="piece">&#24101;</div>
      <div>
        <h1>Xiangqi Bot</h1>
        <div class="sub">Pikafish local</div>
      </div>
      <div id="runState" class="pill"><span class="dot"></span><span>Idle</span></div>
    </div>

    <div id="status" class="status">Ready.</div>

    <button id="startBot" class="primary">Start bot</button>
    <div class="note">If it stops moving, press Stop bot, then Start bot again.</div>

    <div class="section">
      <div class="section-title">Board</div>
      <div class="grid">
        <button id="clickToggle" class="toggle">Auto move</button>
      </div>
      <div id="adaptiveToggle" class="switch-row" role="button" tabindex="0">
        <div>
          <div id="modeTitle" class="switch-title">Fast mode</div>
          <div id="modeSub" class="switch-sub">Move as soon as engine returns.</div>
        </div>
        <div id="modeSwitch" class="switch"></div>
      </div>
      <div class="note">Human-like mode may play weaker than Fast mode.</div>
    </div>

    <div class="section">
      <div class="section-title">Settings</div>
      <div class="controls">
        <label>
          Engine time
          <select id="movetime">
            <option value="500">0.5s</option>
            <option value="1000" selected>1s</option>
            <option value="2000">2s</option>
            <option value="5000">5s</option>
          </select>
        </label>
        <label>
          Skill
          <input id="skill" type="range" min="1" max="5" step="1" value="4">
          <div class="range-labels"><span>Loose</span><span>Sharp</span></div>
        </label>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
